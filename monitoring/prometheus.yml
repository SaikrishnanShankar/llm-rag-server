global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

scrape_configs:
  - job_name: "rag_api"
    static_configs:
      - targets: ["api:8001"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
